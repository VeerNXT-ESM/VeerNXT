<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 60px 30px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 8px;
            margin: 20px;
        }

        .quiz-content {
            padding: 40px;
        }

        .progress-bar {
            background: #eee;
            height: 4px;
            margin-bottom: 30px;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
        }

        .progress-text {
            font-weight: 600;
        }

        .question-number {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 25px;
            color: #333;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option {
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        .option:hover {
            border-color: #667eea;
            background: #f3f4ff;
        }

        .option input[type="radio"] {
            margin-right: 12px;
            cursor: pointer;
        }

        .option label {
            cursor: pointer;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .option-letter {
            display: inline-block;
            background: #667eea;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-weight: 600;
            font-size: 14px;
        }

        .option.selected {
            border-color: #667eea;
            background: #f3f4ff;
        }

        .option.correct {
            border-color: #4caf50;
            background: #f1f8f4;
        }

        .option.correct .option-letter {
            background: #4caf50;
        }

        .option.incorrect {
            border-color: #f44336;
            background: #fef3f2;
        }

        .option.incorrect .option-letter {
            background: #f44336;
        }

        .feedback {
            margin: 20px 0;
            padding: 16px;
            border-radius: 8px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            color: #2e7d32;
        }

        .feedback.incorrect {
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
        }

        .feedback-icon {
            margin-right: 10px;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            margin-top: 30px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            flex: 1;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
        }

        .results {
            text-align: center;
            padding: 40px 20px;
        }

        .results-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .results-score {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .results-text {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }

        .results-details {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #666;
        }

        .detail-value {
            font-weight: 600;
            color: #333;
        }

        .stats-panel {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .stat {
            display: inline-block;
            margin-right: 30px;
            margin-bottom: 10px;
        }

        .stat-label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            display: block;
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .quiz-content {
                padding: 20px;
            }

            .question-text {
                font-size: 16px;
            }

            .header h1 {
                font-size: 22px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Quiz Engine</h1>
            <p>Test Data Validation from JSON</p>
        </div>

        <div class="quiz-content" id="quizContent">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading quiz data...</p>
            </div>
        </div>
    </div>

    <script>
        let quizData = null;
        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        let answers = [];

        async function loadQuiz() {
            try {
                const response = await fetch('/api/quiz/load');
                if (!response.ok) throw new Error('Failed to load quiz');
                
                quizData = await response.json();
                renderQuiz();
            } catch (error) {
                showError(`Error loading quiz: ${error.message}`);
            }
        }

        function renderQuiz() {
            const content = document.getElementById('quizContent');
            
            if (!quizData || quizData.questions.length === 0) {
                content.innerHTML = '<div class="error">No questions found in quiz data</div>';
                return;
            }

            displayQuestion();
        }

        function displayQuestion() {
            if (currentQuestion >= quizData.questions.length) {
                showResults();
                return;
            }

            const question = quizData.questions[currentQuestion];
            const progress = ((currentQuestion + 1) / quizData.questions.length) * 100;
            
            let optionsHtml = Object.entries(question.options).map(([key, value]) => `
                <div class="option" onclick="selectOption(this, '${key}')">
                    <label>
                        <input type="radio" name="answer" value="${key}">
                        <span class="option-letter">${key}</span>
                        <span>${value}</span>
                    </label>
                </div>
            `).join('');

            const content = document.getElementById('quizContent');
            content.innerHTML = `
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${progress}%"></div>
                </div>
                
                <div class="progress-info">
                    <span class="progress-text">Question <span class="question-number">${currentQuestion + 1}/${quizData.questions.length}</span></span>
                    <span>Score: <strong>${score}</strong></span>
                </div>

                <div class="question-text">${question.text}</div>

                <div class="options">
                    ${optionsHtml}
                </div>

                <div class="feedback" id="feedback"></div>

                <div class="button-group">
                    <button class="btn-secondary" onclick="previousQuestion()" ${currentQuestion === 0 ? 'disabled' : ''}>← Previous</button>
                    <button class="btn-primary" id="submitBtn" onclick="submitAnswer()" disabled>Check Answer</button>
                    <button class="btn-secondary" onclick="nextQuestion()" style="display:none" id="nextBtn">Next →</button>
                </div>
            `;

            answered = false;
        }

        function selectOption(element, answer) {
            if (answered) return;

            // Remove previous selection
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            
            // Add selection to clicked option
            element.classList.add('selected');
            element.querySelector('input[type="radio"]').checked = true;

            // Enable submit button
            document.getElementById('submitBtn').disabled = false;
        }

        async function submitAnswer() {
            if (answered) {
                nextQuestion();
                return;
            }

            const selectedOption = document.querySelector('input[type="radio"]:checked');
            if (!selectedOption) {
                alert('Please select an answer');
                return;
            }

            const userAnswer = selectedOption.value;
            const question = quizData.questions[currentQuestion];

            try {
                const response = await fetch('/api/quiz/check-answer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        questionId: question.id,
                        userAnswer: userAnswer
                    })
                });

                const result = await response.json();
                showFeedback(result);
                
                if (result.isCorrect) {
                    score++;
                }

                answers.push({
                    questionId: question.id,
                    userAnswer: userAnswer,
                    correctAnswer: result.correctAnswer,
                    isCorrect: result.isCorrect
                });

                answered = true;
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        function showFeedback(result) {
            const feedback = document.getElementById('feedback');
            const isCorrect = result.isCorrect;
            
            feedback.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
            feedback.innerHTML = `
                <span class="feedback-icon">${isCorrect ? '✓' : '✗'}</span>
                ${isCorrect ? 'Correct!' : `Incorrect. The correct answer is <strong>${result.correctAnswer}</strong>`}
            `;

            // Update options display
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected', 'correct', 'incorrect');
                const input = opt.querySelector('input[type="radio"]');
                if (input.value === result.correctAnswer) {
                    opt.classList.add('correct');
                } else if (input.value === result.userAnswer && !isCorrect) {
                    opt.classList.add('incorrect');
                }
            });

            // Show next button, hide submit button
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'block';
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            currentQuestion++;
            answered = false;
            displayQuestion();
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                answered = false;
                displayQuestion();
            }
        }

        function showResults() {
            const totalQuestions = quizData.questions.length;
            const percentage = Math.round((score / totalQuestions) * 100);
            
            let resultIcon = '🎉';
            let resultMessage = 'Excellent!';
            
            if (percentage >= 80) {
                resultIcon = '🎉';
                resultMessage = 'Excellent work!';
            } else if (percentage >= 60) {
                resultIcon = '👍';
                resultMessage = 'Good job!';
            } else if (percentage >= 40) {
                resultIcon = '📚';
                resultMessage = 'Keep practicing!';
            } else {
                resultIcon = '💪';
                resultMessage = 'You can do better!';
            }

            const content = document.getElementById('quizContent');
            content.innerHTML = `
                <div class="results">
                    <div class="results-icon">${resultIcon}</div>
                    <div class="results-score">${percentage}%</div>
                    <div class="results-text">${resultMessage}</div>
                    
                    <div class="results-details">
                        <div class="detail-row">
                            <span class="detail-label">Correct Answers:</span>
                            <span class="detail-value">${score}/${totalQuestions}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Quiz Title:</span>
                            <span class="detail-value">${quizData.quiz.title}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Source File:</span>
                            <span class="detail-value">${quizData.quiz.source_file.split('\\').pop()}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Questions with Answers:</span>
                            <span class="detail-value">${quizData.metadata.questions_with_answers}/${totalQuestions}</span>
                        </div>
                    </div>

                    <button class="btn-primary" onclick="restartQuiz()">Take Quiz Again</button>
                </div>
            `;
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            answered = false;
            answers = [];
            displayQuestion();
        }

        function showError(message) {
            document.getElementById('quizContent').innerHTML = `<div class="error">${message}</div>`;
        }

        // Load quiz on page load
        window.addEventListener('DOMContentLoaded', loadQuiz);
    </script>
</body>
</html>
